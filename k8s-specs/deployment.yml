apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-deployment
  labels:
    app: e-commerce
  namespace: e-commerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: e-commerce
  template:
    metadata:
      labels:
        app: e-commerce
    spec:
      containers:
        - name: ecommerce-pod
          image: akrdev/e-commerce
          ports:
            - containerPort: 80
